version: '3.9'
services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - MONGO_URI=mongodb://mongodb:27017/carebridge
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      - mongodb
      - ai-service
    ports:
      - '5000:5000'

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    env_file:
      - ./ai-service/.env
    ports:
      - '8000:8000'

volumes:
  mongo_data:
